services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vera
      POSTGRES_PASSWORD: vera
      POSTGRES_DB: vera
    ports:
      - "5432:5432"
    volumes:
      - vera_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vera -d vera"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://vera:vera@db:5432/vera
      SECRET_KEY: docker-dev-secret-change-me
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  vera_pg:
